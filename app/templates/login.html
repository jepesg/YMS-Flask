<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortYard - Autenticação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/global.css') }}">
</head>
<body class="login-body">

    <div class="login-box">
        <div style="color: var(--cor-icones-nav); font-size: 32px; margin-bottom: 5px;"><i class="fas fa-boxes-stacked"></i></div>
        <h2 style="margin: 0; color: var(--cor-icones-nav); font-size: 26px; font-weight: 700;">PortYard</h2>
        <p style="color: var(--texto-mutado); font-size: 13px; margin: 5px 0 25px 0;">Yard Management System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background: #fde8e8; color: #9b1c1c; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; font-weight: 500;">
                        <i class="fas fa-circle-exclamation"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/">
            <div class="form-grupo" style="text-align: left;">
                <label>Usuário ou Operador:</label>
                <input type="text" name="username" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="form-grupo" style="text-align: left; margin-bottom: 25px;">
                <label>Senha de Acesso:</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-custom-tech" style="width: 100%; justify-content: center; height: 44px;"><i class="fas fa-right-to-bracket"></i> Autenticar no Pátio</button>
        </form>
    </div>

</body>
</html>
